name: "CodeQL"

on:
  push:
    branches: [ main ]
    paths:
      - "api/**"
      - "worker/**"
      - "ui/**"
      - ".github/workflows/codeql-analysis.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "api/**"
      - "worker/**"
      - "ui/**"
      - ".github/workflows/codeql-analysis.yml"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          output: results
